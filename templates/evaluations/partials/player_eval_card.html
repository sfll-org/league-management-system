<div id="player-card-{{ card.player_season.pk }}"
     class="bg-gray-800 rounded-xl border transition
         {% if card.evaluated %}border-emerald-700/50{% else %}border-gray-700 hover:border-gray-600{% endif %}">
    <div class="flex items-center justify-between p-4 sm:p-5">
        <div class="flex items-center gap-4">
            {% if card.evaluated %}
            <div class="w-10 h-10 rounded-full bg-emerald-900/50 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            {% else %}
            <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center flex-shrink-0">
                <span class="text-gray-500 text-sm font-medium">--</span>
            </div>
            {% endif %}
            <div>
                <p class="text-lg sm:text-xl font-semibold text-white">
                    {{ card.player_season.player.full_name }}
                </p>
                {% if card.player_season.division %}
                <p class="text-sm text-gray-500">{{ card.player_season.division.name }}</p>
                {% endif %}
            </div>
        </div>
        <a href="{% url 'evaluations:eval_player' station_id=station.pk session_id=session.pk player_season_id=card.player_season.pk %}"
           class="px-5 py-2.5 rounded-xl text-sm font-semibold transition flex-shrink-0
               {% if card.evaluated %}
                   bg-gray-700 text-gray-300 hover:bg-gray-600
               {% else %}
                   bg-emerald-600 text-white hover:bg-emerald-500
               {% endif %}">
            {% if card.evaluated %}Edit{% else %}Evaluate{% endif %}
        </a>
    </div>
</div>
