{# SFLL-92 — Pacific topbar.
   Holds the mobile menu toggle, page title slot, and a placeholder ⌘K hint
   (the actual command palette lands in Phase 10). #}
<header class="lms-topbar">
  <button
    type="button"
    class="lms-topbar__menu-btn"
    @click="navOpen = !navOpen"
    aria-label="Toggle navigation"
  >
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false">
      <line x1="3" y1="6" x2="21" y2="6" />
      <line x1="3" y1="12" x2="21" y2="12" />
      <line x1="3" y1="18" x2="21" y2="18" />
    </svg>
  </button>

  <div class="lms-topbar__title">
    {% block page_title %}{% endblock %}
  </div>

  <div class="lms-topbar__actions">
    {% if lms_power_user %}
    {# SFLL-117 — ⌘K palette button (power users only). #}
    <button
      type="button"
      id="cmdk-topbar-btn"
      class="lms-topbar__cmdk lms-topbar__cmdk--active"
      title="Command palette (⌘K)"
      aria-label="Open command palette"
      onclick="document.dispatchEvent(new CustomEvent('cmdk:open'))"
    >⌘K</button>
    {% else %}
    <kbd class="lms-topbar__cmdk" title="Command palette">⌘K</kbd>
    {% endif %}
  </div>
</header>
